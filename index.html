<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeRacer Lite - Typing Speed Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Typing Speed Test</h1>

    <div id="timer" class="timer">
      <span class="timer-label">Time:</span>
      <span class="timer-value" id="timer-value">60</span>s
    </div>

    <div id="stats" class="stats-panel">
      <div class="stat-item">
        <span class="stat-label">Keys pressed:</span>
        <span class="stat-value" id="keys">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Correct:</span>
        <span class="stat-value" id="correct">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Errors:</span>
        <span class="stat-value error-value" id="errors">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Missed:</span>
        <span class="stat-value" id="missed">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">WPM:</span>
        <span class="stat-value" id="wpm">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Accuracy:</span>
        <span class="stat-value" id="accuracy">100</span>%
      </div>
    </div>

    <div id="word-box" class="word-box"></div>

    <div class="input-container">
      <input id="input" type="text" placeholder="Start typing..." autocomplete="off" autocapitalize="off" spellcheck="false" />
    </div>

    <div class="controls">
      <button id="restart-btn" class="btn btn-secondary">Restart</button>
    </div>

    <div id="results-container"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
